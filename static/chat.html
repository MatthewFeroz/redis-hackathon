<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Leave a Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --surface-900: #0a0f1a;
      --surface-800: #111827;
      --surface-700: #1e293b;
      --surface-600: #334155;
      --emerald-400: #34d399;
      --emerald-500: #10b981;
      --emerald-600: #059669;
      --emerald-700: #047857;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--surface-900);
      color: var(--slate-200);
      line-height: 1.5;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .chat-container {
      max-width: 480px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--surface-800);
      position: relative;
      z-index: 1;
      border-left: 1px solid var(--surface-600);
      border-right: 1px solid var(--surface-600);
    }

    .chat-header {
      background: linear-gradient(135deg, var(--emerald-600), var(--emerald-700));
      color: white;
      padding: 20px 24px;
      text-align: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .chat-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(52, 211, 153, 0.5), transparent);
    }

    .chat-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .chat-header p {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 3px;
      font-weight: 300;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--surface-900);
      scrollbar-width: thin;
      scrollbar-color: var(--surface-600) transparent;
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fade-in 0.2s ease-out;
    }

    .message.assistant {
      background: var(--surface-700);
      color: var(--slate-200);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--surface-600);
    }

    .message.assistant a {
      color: var(--emerald-400);
      text-decoration: underline;
      text-underline-offset: 2px;
      word-break: break-all;
    }

    .message.assistant a:hover {
      color: var(--emerald-500);
    }

    .message.user {
      background: var(--emerald-600);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.typing {
      background: var(--surface-700);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--surface-600);
      color: var(--slate-500);
      font-style: italic;
    }

    .chat-input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--surface-600);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      background: var(--surface-800);
    }

    .chat-input-area input {
      flex: 1;
      padding: 10px 16px;
      background: var(--surface-900);
      border: 1px solid var(--surface-600);
      border-radius: 24px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      color: var(--slate-200);
      outline: none;
      transition: border-color 0.2s;
    }

    .chat-input-area input::placeholder {
      color: var(--slate-600);
    }

    .chat-input-area input:focus {
      border-color: rgba(16, 185, 129, 0.5);
      box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.2);
    }

    .chat-input-area button {
      background: var(--emerald-600);
      color: white;
      border: none;
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    .chat-input-area button:hover {
      background: var(--emerald-500);
    }

    .chat-input-area button:disabled {
      background: var(--surface-600);
      color: var(--slate-500);
      cursor: not-allowed;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>R&M Plumbing and Heating</h1>
      <p>Hi {{CUSTOMER_NAME}}! We'd love your feedback</p>
    </div>
    <div class="chat-messages" id="messages"></div>
    <div class="chat-input-area">
      <input type="text" id="input" placeholder="Type a message..." autocomplete="off">
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script>
    const SESSION_ID = "{{SESSION_ID}}";
  </script>
  <script src="/static/chat.js"></script>
</body>
</html>
